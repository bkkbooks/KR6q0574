body:
  text: 敘中州學浮屠法者曰何一禪師早于大梁諸剎中稱健出既而遊上國行逾高名逾起其披剃聽經受戒不一師而其宗門之師曰性空禪師遠自臨濟近接天童授受之際歷歷可數所謂大善知識得禪定智慧者也予與性空禪師無覿面之緣而以同里雅與何一遊何一攜所梓性空禪師語錄屬予敘其首予曰宗門奉達磨為鼻祖達磨西來欲掃除一切文字直指人心見性成佛則此纍纍卷帙在性空禪師已為剩語而又何有于敘得無畫蛇添足耶何一曰佛入涅槃阿難傳佛語為經流行天竺遂及東土蓋弟子記錄師訓自古而然今雖不敢以拈花微笑自擬而師弟顯有授受既承其誨不可不永其傳居士其敘之母辭予于言下見何一之不昧師傳而因以嘆性空禪師知人之明也性空一瓶一缽數千里渡江北來擇付法之人爾時聞聲而慕踵門而謁者百千焉獨有契于何一解缽而授何一恪遵其指大闡宗風于今梓其語錄傳之無窮性空禪師且以不歿可不謂擇人得人能具一隻眼乎能具眼者自能具舌語錄所載當為無上妙諦無疑不知其言視其識不知其師視其弟子予于語錄不待讀之畢而可得其概也顧予所能言者彝倫日用之常修己治人之務而于禪機變幻不即不離之界自覺舌本木強無可舉似茲之敘也聊以代述其授梓之始末云爾時康熙三十有二年歲次癸酉桂月之望前七日中州河陽毛鵑拜撰性空禪師語錄敘自有天地以來立教者亦不一矣然必有至真至實者寓於中而後歷意萬年而不毀否則不轉瞬即以敗廢求其如薪傳火相續不絕必無之事也粵達磨西來佛法入中國久矣雖有時而顯有時而晦而實無時而滅大意則不立文字直指人心無非恐人於聞見上卜度識解上承當反將自己空如止水照如明鏡一段本地風光不能從內打出埋沒性靈故欲去其偽存其真去其虛存其實也若然就佛言佛則文字乃障道之門而八萬四千枝葉一千七百葛藤謂之有文字乎謂之無文字乎有時謂之有文字也得謂之無文字也得謂之有文字無文字總得有時謂之有文字也不得謂之無文字也不得謂之有文字無文字總不得苟非大過來人具有隻眼正未許著一語耳性禪師語句見在試取而讀之才覺無下手處便自有下手處矣是固自有天地以來之至玅至玅者與倘有一箇半箇曰有甚交涉其信然乎雖以之覆瓿可也康熙丁丑夏中州張發辰拜書性空臻禪師語錄目錄第一卷上堂第二卷上堂第三卷小參示眾機緣第四卷拈頌第五卷拈頌像讚偈第六卷偈佛事塔銘門人位次
