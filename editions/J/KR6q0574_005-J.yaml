body:
  text: 嗣法門人超曉超自等編拈頌舉德山托缽公案罷復云從上千七百則葛藤其中淆訛者無出於此但諸方拈弄者甚多間有一二尊宿也只是依俙彷彿蓋過便休今日山僧不惜眉毛與諸人拈弄一上也要諸方檢點德山托缽向法堂前過擬釣獰龍澄巨浸雪峰道這老漢鐘未鳴鼓未響托缽向什麼處去卻嗟蛙步𩥇泥沙山便低頭歸方丈一般清意味料得少人知峰語巖頭頭云德山老漢未會末後句在瞞雪峰即得山命侍者喚巖頭云你不肯老僧那賊人膽虛頭便密啟其意也是鞏縣茶瓶山明日陞堂果與尋常不同要此話行頭向堂前拍手大笑云且喜老漢會末後句雖然如是只得三年前箭猶輕後箭猶重山果三年而歿疑殺天下人敢問諸人還見德山老子落處麼聽取一頌末後句有來由德山父子謾相酬誰知更有新條在惱亂春風卒未休舉臨濟在黃檗普請機緣師云黃檗普請家常活計臨濟拄钁預報其功檗曰這漢困那明修棧道濟曰钁也未舉困個什麼暗度陳倉黃檗便打不得放過臨濟接住送倒放過不得檗呼維那牽累別人維那果來扶起誰知好心無好報檗起身便打維那大似捉賊不得反怪鄰里濟便钁地曰諸方火葬我這裡活埋可謂踞虎頭收虎尾山僧如此批判要與古人同一鼻孔出氣且道諸人還甘麼若有不甘者不妨出來對眾分析看若分析不出也須自掘坑子埋卻始得頌曰一條拄杖兩人扶信有其鄰德不孤將謂鬍鬚唯獨赤誰知更有赤鬚鬍舉九峰道虔禪師不肯泰首座機緣香煙未斷便能脫去若非昔日工夫焉能如此但洞上門庭語忌十成機貴回互首座荅個一色邊事正是十成死語未免遭人折挫道虔雖具驅耕奪食手眼當仁不讓檢點將來正是臨井推人未見好手當時若問山僧如何是一條白練去向他道看腳下他更擬議劈脊便棒不唯一代住持有分亦使道虔侍者頓息我慢頌曰好人偏遇惡人魔死結冤家沒柰何只為一言初不慎至今怨氣未消磨舉僧問梁山家賊難防公案頌曰龍驤虎嘯欲驚群不比狐狼歷亂行騰踏自然超物外叢林今古振家聲因鐘山維那舉三角示眾云云請問事理俱備妙協貫通善辯來機應時及節在印師得之矣敢問諸人還知他二人語脈落處麼其或未然且看下面註腳角云大凡演唱宗乘須要應時及節且道是中秋是冬至有僧便出禮拜云四黃四赤時如何送入紅爐再煆看角云三月杖頭挑摘卻青帘沾客少僧云因甚滿肚皮貯氣把扇風來手自搖角云怎柰這條繩何郎當鼻孔被人穿僧云何時得消去一塊頑皮更覓錐角云只待皮穿原來不值半文錢山僧今日不惜眉毛為汝分明註破了也且道三月杖頭挑畢竟是個什麼鐘擬議師便打舉山翁和尚一日牽驢巡堂一匝命眾下語不契自作驢鳴而出師云大小山翁雖善向異類中行要且無大人相惜乎那一堂驢但念水草餘無所知當時山僧若在見他如此做次將一把草塞斷驢口以手拍驢背云這畜生他若便作驢鳴但連打揵板三下山僧如此批判還有人為伊不甘者麼設有也是驢前馬後漢頌曰千年古木久成精特地相將異類行信步踏歌呈巧妙無人能和作驢鳴舉臨濟大師四料揀奪人不奪境玉蝶穿花舞黃鸝織柳嬌送書人來到醉倒洛陽橋奪境不奪人雨打梨花落風吹柳絮飛竹笻春日暮門外自攜歸人境兩俱奪智可來天下轅門盡楚歌江東舊游地無面奈如何人境俱不奪山前逢野老嶺外值樵夫坐石談風月相看入畫圖舉臨濟大師示眾三句第一句中薦得堪與佛祖為師諸佛師咽喉小未措辭先靠倒道得依然落二機國清寺裡豐干老第二句中薦得堪與人天為師突出兮卒難辯快若梭急如電眨上眉毛早錯過徒遭白棒當頭點第三句中薦得自救不了栗棘蓬金剛圈擬吞跳涉廉纖夜深踏白須知水差卻毫釐天地懸舉臨濟大師三玄謾把三玄取次開須知一句總全該燈籠緣壁天台去觱桌催雲海上來缺角泥牛顛白額無毛鐵鷂打黃能虛空昨夜閒開口吞卻階前下馬臺舉臨濟大師三要明明句理分三要臨濟老師只一竅喝似雷奔擬爽神棒如雨點徒施巧眨眼遭他陷虎機轉身早上擒龍釣普化當年成褫伊等閒未許通方道舉臨濟大師四喝金剛寶劍厥之有章不犯之令的露堂堂踞地獅子突出窠臼纔動尾巴爪牙俱露探竿影草分明可見衲子難瞞龍蛇易辯不作喝用是什麼碗覿面來也不容眨眼舉臨濟大師四賓主賓中主相如奪壁還趙英豪天下名標盡道客從主便誰知主是賓饒主中賓客至堂前拱立問渠來處端倪只為貪他一滴幾乎打失雙眉主中主正令全提尊貴當機誰敢衝風四海狼煙盡息巍巍獨振寰中賓中賓一味傳言送語諸方何可東西若解倦來打睡自然餓也噇虀舉臨濟大師四照用先照而後用大冶紅爐煆雪花寒香片片意無涯拈來不薦當頭棒鶻眼龍睛盡著沙先用而後照石火光中掣電機未容擬議已遭椎分明月在梅花上看到梅稍早已遲照與用同時雷轟電擊在欄干若個聞風不膽寒縱使久經行陣客到來難過鐵門關照用不同時看到山窮水亦窮洞房春色十分濃遊蜂逐蝶穿花過未諳猶如在夢中山中四威儀山中行臨流撥草杖頭橫小魚兒聿過石苔驚山中住一室天然開六戶日東昇紅霞堆滿樹山中坐就石敷床可達磨為安心等個人兒過山中臥石門松掩雲敲破忽開窗桃落猿走過𠁼字頌無端捏怪老瞿曇習氣難忘自不慚點出三爻凶象險乾坤爍破許誰看讚觀音大哉觀世音能作多方便如月印千江一切塵中現救苦惱之眾生用悲心而無倦稱其名也獲六十二億恒河沙菩薩利益睹其像也得三十二應功德普門之神變夫是之為普覺有情寧不稽首而讚歎水月觀音稽首慈悲大願王感應道交難思議三十二應眾妙身如天一月含眾水隨願所懇悉圓成故我恒常而頂禮文殊五臺山上老文殊跨下金毛入畫圖頭角未容輕顯露爪牙先已布江湖神清貌古通人愛語直機圓與世疏曾對前三無著問而今佛法又何如三大士出山像看你三人有甚伎倆纔出山來百醜難狀娑羅樹下且藏身高高危坐石頭上不說法不談禪大開冷眼對青山宛如忘卻來時路幾乎笑殺是傍觀彌勒靠卻布袋堆桅獨坐纔舉念頭早已話墮且到龍華會時方可與汝道破千佛觀音通身是遍身是頭頭顯露即不得離不得是甚矢橛楊柳化竹枝淨瓶如木突盡道伊是千佛觀音仔細看來一身螺節觀音自在觀音觀音何在剎剎逢渠塵塵不昧尋聲救苦度迷情到處卻成灰布袋咄題伏虎羅漢殺無明賊滅痴暗母眼突瞋睛手擒猛虎廓然放下自知非六通縱有何相補題泛海觀音大士慈悲願力多尋聲救苦入娑婆洛陽橋畔無人識一葉蓮舟泛海波題本師費老和尚室內投機非父莫知其子堂前鏟草非子莫知其父只如父慈子孝師嚴道尊惟吾本師老人真法社之總裁宗門之樞要縱使簾前賜紫僥倖之輩若較其為人之真實荷道之任重又何啻於天壤哉題華山見月律師真兩鬢蓬鬆頂光突兀盡道伊是以身相說法現威儀而度生殊不知真末世之鉗鎚細行中之古佛咄咄題了念老宿小像這個老叟襟懷不醜紫衲橫肩青藜在手擴玄機聊以心通恣遊戲不用腳走大段有些兒見人懶開口阿呵呵真傑陡行藏詎落寒山後丹青描出玉峰前一任世人稱希有題李傳真小像是真非真非像是像就中些子無物為況杳兮冥忽兮恍離婁不得睹其形滿願詎能談其狀默默對清虛分明自詶唱呵呵呵甚倜儻維摩若見還相讓懸向高堂仔細看料伊不在丹青上偈詠紙花幻出玲瓏手名花巧樣粧自甘違雨露誰謂避風霜有色來蜂舞無香賺蜨忙只因空我相堪供法中王為慧來師六十壽野鶴閒雲已出塵青眉白髮老龍鱗峰頭縱目乾坤闊花甲重添錦上春闢荒建剎卓錫東郊外方塘翠藹間輸金營梵剎刈草結禪關境僻宜吾拙緣疏愈客慳一朝千載意誰識老僧顏屋繞清流一擲彈丸地千秋崒水央波濤傳梵唄風月繞簷廊魚靜思鵬化禽閒學鳳翔幾多遊賞客到此卻情忘師過餘姚藏閣眾知師未事筆墨強師作偈云打翻龍藏就中參露布葛藤疋是閒留得一雙青白眼看他月上幾層山贈在衲老宿一從參罷老天童肘被靈符印碧空茅屋竹床拳作枕高蹤不與世人同孟冬送未能嚴居士過天台楓葉半紺江日暮錦帆斜挂朔風飄天台此去誰相識千里應懷道格高送月林老衲上雲間輕快一肩雲補衲逍遙數節竹為笻九峰七塔連三泖和月堪圖入畫中贈雪舟侍者三十寒侵徹骨齊腰雪謾說安心便肯休況值歷年來韻早梅花香雪可藏舟為瞿識禪人瞿曇面目如何識指出毫端好自看萬象撥開塵劫外碧天高挂一輪寒立予上人求偈老漢未曾攻筆硯堂前終日買風煙因君數數來柏偪拈起禿毫寫不連和韻荅劍門法兄疇昔分燈把杖行敲空作頌聽鵑聲山林自喜嘲風月江海誰能辯濁清籠竹淡煙閒丈室盈窗紅日映孤城一從聚首天童後未有人書座右銘和朽木偈不犯輪扁手自量樗材雖老益野張曲枝避鳥懤無用虛林藏猿羨有方萬壑每隨雲化影千山常共月流光區區物外閒多趣猶得天年道可當梅下聞計弔韜明法兄梅花得意正春妍忽爾狂風一夜殘滿地枯枝徒歷亂濺牙青子但悲酸吟香野客詩囊冷探蕊遊蜂粉翅乾幾幾同條空太息日沉孤影上欄干送野松上人歸楚寒灰撥盡客西東賓主爐頭話已窮瓦缽橫肩千里月布帆斜挂一江風臨期索我送行偈搜竭枯腸無半字忽然乘興便揮毫寫出離言非別意曾聞楚國老襄陽觸著些兒便發狂立地腳跟如未穩撩天鼻孔謾郎當恒如蔣居士七秩耳聰目皎若童蒙貌古神清如高松達得大概為紀客不能盡述聊相通河沙算師數難窮海屋仙籌徒枉功白鶴翔臨玉闕同青牛跨下玄關東颯行履健非扶笻席坐雄談欽俗聾吾欲讚之不可盡禿毫尖上寫秋風贈大道老宿八十餘春個老宿氣如角虎勢難擉神清目皎察秋毫貌古心慈能格物物格之機不自瞞雪花拋向紅爐看灼然鍛煉由來久爆碎胸中鐵一團君是綿州育生長巴歌須是蜀音唱當年演祖太風流流水高山亦相讓荅常熟眾護法請住維摩官催火急似油煎百計尋辭未許閒項上無枷應自適鼻頭有索被君牽琴川水闊魚堪躍虞岫風高鳥倦還好個話頭休說破維摩默默尚留連燕山誥封夫人關門伊氏率男茂盛玻爾坤楚蠻子施貲在京師崇寧庵刻
