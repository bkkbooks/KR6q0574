body:
  text: 嗣法門人超曉超自等編囑即健勝後堂傑陡禪和真猛力黃檗當年接臨濟婆心太切許誰知忤逆廝兒只這是奪食驅耕不等閒拈槌豎拂豈容易今將頭角且深藏春至一聲轟霹靂囑天衢寓堂主衝開權角自來雄聖箭還如射九重此去逢人休放過當頭白棒展家風囑尚德曉西堂一語投機開活眼虎鬚捋倒始全威青藜七尺親分付棒喝縱橫任爾為囑何一自首座截斷當年舊葛枝一毫頭上廓玄機迅雷喝下翻身去個是吾家獅子兒居士求施茶偈年年五六黃梅月炎暑蒸人何太切趙老茶味驗知音文殊把盞勘無著閒消半滴獲清涼忙暇一杯除瘴熱會取其中端的旨莫嫌選佛多饒舌示狂客祖道秋林木葉疏沙盆落落倩誰扶不才未了青黃輩甘作無知輕薄徒盈腹膏肓人易壞通身毛病藥難除狂夫請自回頭看做得瞿曇弟子無示句非侍者親師擇友恣遨遊撥草瞻風僅十秋古路踏番添意氣布毛舉處得心休投機有句盤珠轉契理無非水月幽今日辭歸故里去好將白棒接高流示豐書記南歸故里三度逢場非是戲一機纔叩便翱翔化鵬鼓翅南溟去擒得龍歸舊處藏示若鶤侍者少年氣宇吞寰海別我難辭吹布毛此去逢人如借問舉拳只向驀頭敲示片石一片石頭孤硬千尋積翠含霞月出雲飛霄漢香氣雪裡梅花示園頭栽蔬訣要勤澆灌培得根深葉自多莫惜疲勞肩手力王瓜茄子念摩訶十二時歌半夜子忘彼此忽憶瞿曇那些子天邊若不露星兒六載獃獃幾坐死雞鳴丑嬾開口兩眼紅塵驅不走倒番木枕下床頭驚起法身藏北斗平旦寅好施陳拈香燡火許誰親忽然看到梅稍月五葉一花萬萬春日出卯客作早忙忙收拾衣中實區區愛喫苦瓜萸一任諸方取蜜棗食時辰齒生津饑餐馬麥勝饈珍當年懶瓚猶忻怡糞火常煨紫芋馨禺中巳無他事運水搬柴只這是倚笻獨立玉峰前背手橫眸書梵字日南午合賓主雲從龍兮風從虎兩兩相逢吼一聲驚番五嶽樸泥土日昳未誰作對鐵額銅頭輥一塊萬鍛紅爐片雪飛摩醯覷著眼須昧晡時申令斬新高提白棒逐青蠅可憐近代尋羶者盡媚時人背古人日入酉還知否人生誰是得長久區區活計百年心仔細看來沒來由黃昏戌莫相促默坐床頭清一忽間然不覺到忘機那管奴郎罵我禿人定亥猶叵耐賊兒竊我缽囊袋從教徹底盡掀番還有山僧這個在佛事為法忍律師封龕師以拄杖指龕云生本無生枯木花開越樣新死木不死瞿耶落月扶桑起恭惟圓寂法忍律師不能空寂洞達無生若片雲點於太清布陽春生於暖谷或悲或喜咸稱自性彌陀屈指成拳覿示本來戒相今朝功圓行滿得便還家末後慇懃踢番覺路且道封龕一句又作麼生以拄杖橫一橫云封為鐵舟禪師上供拈香罷卓拄杖云生不生死不死生死何曾離這裡而今面目儼然在匝地清風吹不已吹不已實可憐隴頭花折一枝殘離離香散遊人少留得梅稍月自看本師隱老和尚計音至領眾上供拈香云昔年被師瞞多少冷地思量恨轉深今日瓣香呈後供報恩何似報冤親且道冤作麼生報遂豎起拳震威一喝云老人面目現在兩序大眾為我證明為峽山禪師封龕師云數載辛苦漸漸葺成保社一條拄杖凜凜撐拄門庭眾檀咸以歡心過客無不讚歎奈因宿業未了魔障隨身挽臂相持痛錐徹骨正所謂道高一尺魔高一丈到此田地只得豁開本地風光放出自家手段生死關頭盡底掀番人我山峻一齊推倒有佛處不得住藏身處沒蹤跡無佛處急走過沒蹤跡處莫藏身若與麼去不妨坦然自由逍遙快樂且道封龕一句又作麼生重重錦縫無尋處一道神光覿面看為龔氏三鼓下火師以拄杖擊棺三下云醒醒著莫瞌睡聽我說無生連漏頻催促金雞聲碎皓月當空清風匝地不是心不是物片玉峰頭雲一突山是山水是水其中消息誰能委若向這裏會得便知自己本命元辰落處遂以火炬摵一摵云火裏蟭螟吞大虫通身湧出光明聚為超淵火師舉火炬云孤迥迥峭巍巍圓陀陀光灼灼諸人到此只合傍觀獨許超淵一回親證所以火燄為三世諸佛說法三世諸佛立地聽敢問諸人說又說於何法聽又聽個什麼遂攛火炬云通身勝熱太風流觸著些兒真快活為覺聞禪人火師拈火炬云汝本徽州人今作他鄉客偶爾撞將來這裡酬宿債宿債既酬且道安身立命又向什麼處去攛火炬云脫殼烏龜飛上天泥牛踏破澄潭月為了念禪德封龕師云出家道流當以忍苦修行利俗為要口喫施主飯身穿檀信衣貴乎頂𩕳一著透脫腳跟下本分事清徹然後入廛垂手應物隨機利己利人彼此事辦乃至臨末稍頭去住自出則不被塵境所惑脫或依俙越國彷彿楊州莽莽蕩蕩無果無因儱儱侗侗誤人誤己於生死關頭不破無常殺鬼來追時節做手腳不迭遂高聲呼云了念禪德此是山僧真實為汝分明說破汝還知麼汝還覺麼選佛場中留不住卻來這裡便安身身前縱有千言好怎似臨行一句親且道如何是臨行一句以手向北指云為君指出臺山路撒手飄然驀直行復為火舉火炬打圓相云了無所了君須了即念離念無別念而今了念契無生直至菩提光燦爛福嚴隱老和尚三周上供拈香云大眾今日是我老和尚忌辰之日雖是常住淡薄無可表陳不免炊金牛飯煎雲門餅烹趙州茶沽曹山酒惟願和尚光臨納受不謂酬恩報德要見末後慇懃不肖臻更操後絃琴唱無生曲打禾山鼓輥雪峰毬以為供養省儉實是省儉熱鬧亦為熱鬧敢道古今未有似不肖如此真實供養酬恩報德且止畢竟以何為孝道復炷香云以此為孝道為維摩天則法兄和尚封龕師至龕前以拄杖卓一卓云瞿曇四月八日生汝何四月八日死雖然生死不同途究竟同歸解脫海恭惟天則大禪師昔承師命主席維摩數年化道琴水傳聲一旦飄然虞山失色薰風堆裡摘楊花撒手圓成末後句直得藏身處沒蹤跡沒蹤跡處且藏身且道封龕一句又作麼生全體蹔將雲片合金棺不必未雙足塔銘康熙十七年冬臨濟宗三十二世性空臻禪師告寂於京師龍泉寺越明年正月門人超曉等用其法闍維火燼之餘四齒不壞得五色舍利子凡三百餘顆法眾見者咸流涕太息謂師之道行為希有也超曉將函其骨南歸乃持道安靜禪師所撰行狀乞銘師之塔師常訪予寓舍予見師眉目蒼秀脊骨稜稜出衣表與語簡澹有味方欲援以為方外交而不意其遽逝矣予悵然久之因是不敢以不文為解按狀師諱行臻字性空代州人姓邊氏母韓夢金牛入懷而娠弱不茹葷好靜坐甫十餘歲薙髮為僧遍遊諸方者數年聞天童密雲老和尚法席之盛往受具戒咨決生死大事問生從何來和尚棒云即今從何處來進云從堂中來和尚又棒云既從堂中來還歸堂中去師茫然其後聞山石崩墜有聲始有省復求印證和尚連棒趁出以而遊楊州福緣菴閱大藏經得雲門語錄中語恍然見密老和尚大機大用覺情與無情悉在自己光明中顯現欲復往依之而值密老和尚遷化遂走謁費隱老和尚於金粟寺費和尚即密和尚授法大弟子也命充監院如是十三年深加器重曰先師之道賴子不孤矣而師猶不欲以出世目炫也棲止崑山陳氏廢園中頹垣老屋饘粥不給恬然不為意踰五年徒似漸集檀施亦不遠數百里而來於是創建殿堂樓閣及方丈之室香積之廚無不悉備琱礱丹黝冠於一邑巍然稱寶坊矣乃標其額曰選佛場諸方衲子傾慕挈瓶掛錫問法座下者日夜不絕恒苦乏食又募田若干畝以備接眾費會虞山維摩延師住持師厭選佛之喧也往應其請未幾語門人曰吾老矣吾北人也緣當在北盍往遊帝都乎遂偕超曉輩擔囊附舟趍京師寓龍泉寺不四月而示疾常熟翁司空寶林方進謁次師與坐語未竟合掌跏趺而逝室中微聞異香踰時不絕臨逝時不說偈不作遺囑識者稱其有古雪竇之風師在選佛場也嘗因僧化席書偈有百丈當年卷卻玉峰今日重鋪之句僧問百丈既經卷卻玉峰何故重鋪師云為汝瞌睡未醒僧送拄杖師云古人道你有拄杖子與你拄杖子你無拄杖子奪卻你拄杖子意旨如何僧云學人送與和尚師云如是即被山僧奪卻也僧擬議師大笑問懸羊頭賣狗肉意旨如何師云看破不值分文進云衲僧本分事如何師云老僧無氣力荅汝蓋其方便接引多類此壽七十一僧臘六十一嗣法門人超自等二十餘人受度者不計數有語錄六卷行世塔在常熟縣之西維摩寺銘曰道法如用源同派別臨濟一宗雲仍相接堂堂天童實推中興師其世嫡祖印是承建大法幢擊大法鼓應機豎拂用道聾瞽清風白雲去來無蹤撞倒須彌獨露虛空婁江之濱巍巍窣堵人龍皈依永衛斯土賜進士出身翰林院編修充纂修明史官前奉政大夫刑部山東清吏司郎中長州汪琬譔文嗣法門人位次嵩堂即健福建天山超仙寧波府佛裔松江府天浪超翰福建智隱福建天衢超寓松江府上海縣楚堂超稷楊州府宗喝超濟福建大隱超卓河南白雲超隱杭州府旵堂宜興道岸超登湖廣蘧菴超雍湖廣淨穎超卓蘇州府太倉州德門超驥江西法愷湖廣祖印福建尚德超曉蘇州府吳縣悅山超惠楊州府巨方楊州府何一超自河南杞縣燕山誥封夫人關門伊氏率男茂盛玻爾坤楚蠻子施貲在京師崇寧庵刻
