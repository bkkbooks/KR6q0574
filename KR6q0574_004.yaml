body:
  text: 嗣法門人超曉超自等編拈頌世尊拈花迦葉微笑拈世尊將蝦釣鱉頭陀見餌忘鉤卻被百萬人天當面看破且道如何是他看破處面皺只因陪笑得背駝將謂鞠躬多頌一花拈出露全機說向瞿曇少弄奇卻被傍觀親看破微微冷笑到今時世尊陞座大眾集定文殊白椎云諦觀法王法法王法如是世尊便下座拈你看這兩個漢大似合拍唱胡笳雖然曲調分明只恐知音者少頌明月臺前照未休漁翁樵父兩綢繆誰知此處無魚釣收拾絲綸別下鉤五通仙人問世尊有六通我有五通如何是那一通佛召五通仙人仙人應諾佛云那一通汝問我拈仙人雖然應得不差若是那一通決定不知落處在頌五陵公子探春慣深入華藂似夢同不識廬山真面目只因身在此山中文殊三處度夏迦葉欲白椎擯出乃見百千萬億文殊迦葉盡其神力椎不能舉世尊遂問迦葉你擬擯那個文殊迦葉無對拈文殊隨處風流大似私通車馬迦葉看孔著楔由來官不容鍼檢點將來總被老瞿曇熱瞞了也山僧若見他道汝擯那個文殊便與劈面一椎只教瞿曇通身手眼迴避不及頌堪笑靈山老釋迦規繩不整亂如麻引他無限癡男女流水橋邊看落花世尊涅槃會上摩胸告眾曰汝等善觀吾紫磨金色之身瞻仰取足勿令後悔若謂吾滅度非吾弟子謂吾不滅度亦非吾弟子拈釋迦老子向來說心說性處分事分理今日臨末稍頭只得動靜雙融生死不二大似猢猻入布袋伎倆已盡雖然如是個中能有幾人向摩胸處著眼頌人之將死其言善鳥若亡時聲更哀個裏是誰知手腳都盧好與一坑埋賓頭盧尊者赴阿育王宮大會王行香次作禮問曰承聞尊者親見佛來是否者以手策起眉毛曰會麼王曰不會者曰阿耨達池龍王請佛齋是時吾亦預其數拈尊者大似因齋慶讚將佛三十二相八十種好一時揭露了也當時育王若是個漢待他策起眉毛便云醜直教尊者雙眉落地頌趕供邏齋老古錐眉毛尖上掛須彌當時策起雖奇特打失將何蓋面皮女子出定諸佛各還本處唯一女子近佛而坐入於三昧文殊白佛曰如何此女得近佛坐佛告文殊汝自覺此女定出問之文殊托至梵天盡其神力而不能出世尊云下方有罔明菩薩能出此女人定須臾罔明大士從地湧出作禮世尊世尊敕罔明出罔明卻至女子前鳴指一下女子於是從定而出拈靈山這夥賊漢弄盡精魂逞盡伎倆大似證龜成鱉到底難瞞明眼不得何故不見道僧投寺裡宿賊打不防家頌桃花綻菊花綻各自知時有方便古今多少賞春人不識東君空覿面池州甘贄行者一日入南泉設粥仍請南泉念誦泉乃白椎曰請大眾為狸奴白牯念摩訶般若波羅蜜甘拂袖便出泉粥後問典座行者在甚處座曰當時便去也泉便打破鍋子拈甘贄行肅兵之令南泉施定亂之謀若據正眼觀來二俱失利頌放去收來太險生作家用處豈留情謾云相識滿天下真個知心有幾人南泉一日東西兩堂爭貓兒南泉見遂提起貓云道得即不斬眾無對泉斬卻貓兒為兩段泉復舉前話問趙州州便脫草鞋於頭上戴出泉云子若在恰救得貓兒拈南泉老漢大似勾司賣卜直向堂前東卜西卜求個買兆底鬼也無卻向草鞋頭上打鞦韆頌全提正令兮日月齊昏神嚎鬼哭兮地裂天崩三軍驚駭兮魂消膽落一箭解圍兮射戟轅門臨濟曰第一句薦得堪與佛祖為師第二句薦得堪與人天為師第三句薦得自救不了拈老大臨濟作如此見解提持向上惑亂天下人未有了日在惜乎當時一眾無人若下得三個錯字管教老漢目瞪口啞頌裂一作三金圈栗棘擲下令人吞吐不得當時若有傍觀者踢殺當年白拈賊僧問賣鹽翁覆船路向什麼處去翁放下鹽擔良久僧又問翁曰你患聾那僧曰你向我道什麼翁曰向汝道覆船路僧曰翁莫會禪麼翁曰莫道會禪佛法也會盡僧曰你試說看翁便挑起鹽擔僧曰難翁曰你喚這個作什麼僧曰鹽翁曰有什麼交涉僧曰你喚作什麼翁曰不可更向你道是鹽拈這個鹽翁雖是通身手眼看來猶在半途這僧未有主宰只是隨他摟搜有甚用處若是山僧待他良久便一把扭住叫地方你看這販私鹽賊漢未曾領官票在他若擬議驀拓開云看破了也便走敢保這漢肩挑不上頌途路相逢問覆船鹽翁步步為周全師僧若是巡鹽手把住還應索票錢臨濟上堂兩堂首座相見同時下喝僧問濟還有賓主也無濟曰賓主歷然濟復召眾曰要會臨濟賓主句問取堂中二首座拈二首座雖然啐啄同時箭鋒相拄若不得這僧為伊發揚怎見得賓主歷然且作麼生是賓主歷然底句天共白雲曉水和明月流頌明暗何曾合得伊主賓端的在臨時羚羊掛角高枝上癡犬尋蹤遶樹馳趙州因南泉曰今時人須向異類中行始得拈王老師大似憐兒不覺醜被趙州一拶直得四稜著地叵耐這漢猶是不肯放過近前踏倒不勝快便猶向涅槃堂裏伸怨叫屈殊不知得便宜處失便宜若有人問山僧如何是異類只向伊道擎頭戴角拖犁拽耙且道與南泉是同是別頌王老親從異類行明明羞恥不瞞人若無如是超方作未免隨他受苦辛臨濟因黃檗普請隨後行檗回頭見濟空手乃問钁在何處濟曰有一人將去了也檗曰近前來與汝商量個事濟便近前檗豎起钁曰只這個天下人提掇不起濟就手掣得豎起曰為甚卻在某甲手裏檗曰今日自有人普請便回拈黃檗雖然老將未免懡㦬而歸山僧若見他道為甚卻在某甲手裡但道老僧今日失利且道把柄在阿誰手裏頌撩鉤搭索能多事奪角衝開藝更便不是子強欺父弱只因活計钁頭邊僧問雲門云一口吞盡時如何門云我在你肚裏僧曰和尚為什麼在學人肚裏門曰還我話頭來拈這僧莽鹵一擔雲門偷心十分用個倒身之計將這僧三膲六腑生熟二臟盡情搬出自己卻頓在裏許未免令人好笑這僧若是選佛但云多謝和尚供養頌問得似奇荅得恰好鹵莽禪和自生懊惱作家到底不作家到底作家屙出了官人問趙州還入地獄否州云老僧末上入官人曰大善知識為什麼入地獄州云我若不入阿誰教化汝拈趙州老賊捨得自己贏得他人則不無怎奈渾身泥水頌雷門撾布鼓日下弄螢光一個渾身倒羞慚何處藏僧問興化四面八方來時如何師曰打中間底僧便禮拜師曰昨日赴個村齋途中遇一陣卒風暴雨卻向古廟裏躲避得過拈這僧雷聲浩大雨點全無興化善辯來風只消一點雖然如是敲磕將來也是急水下篙未免氣急殺人若問山僧四面八方來時如何便與劈頭一棒何故聻不見道口是禍門頌八面來時風勢險當陽一點定山河若無韓信張良策謾向轅門唱楚歌僧問曹山世間何物最貴山曰死貓頭最貴僧問為甚死貓頭最貴山曰無人著價拈曹山荅話奇特本色未見若是正眼看來未免在貴賤裏折倒眾中若有英特之士出來問山僧不屬貴賤一句又作麼生但向伊道杖頭短拄三竿日衣帶長牽一線風頌世上何物最貴曹山荅死貓頭可惜無人著價只堪塞壑填溝僧問雲門從上來事請師提綱門云朝看東南暮看西北僧曰便恁麼去時如何門曰東家點燈西家暗坐拈雲門大師眼光爍破四天下則不無若是提綱從上來事未免指東畫西頌暗裏拋金鎖明中擲玉鉤賺他門外客坐得冷湫湫趙州到一菴主處問有麼有麼主豎起拳頭州曰水淺不是泊船處便行州又到一菴主處問有麼有麼主亦豎起拳頭州曰能縱能奪能殺能活便作禮拈趙州年老只管逢人賣嘴不顧舌頭拖地頌斷頭船子泛江心猶把絲綸釣晚曛無孔笛吹驚兩岸短長格調舌頭分興化謂克賓維那曰汝不久為唱道之師賓曰不入這保社化曰會了不入不會了不入賓曰總不與麼化便打曰克賓維那法戰不勝罰錢五貫設饡飯一堂次日化自白椎曰克賓維那法戰不勝不得喫飯即便出院拈盡道克賓失錢遭罪有理難伸殊不知重賞之下必有勇夫敢問諸人還知興化老人作用處麼良久云不入驚人浪難得稱意魚頌一不做二不休不是冤家不聚頭打了罰錢趁出院不風流處轉風流慈明禪師冬日榜示僧堂作此字其下註云若人識得不離四威儀中有首座見之謂曰和尚今日放參師聞而笑之拈慈明老人無端將三百六十骨節八萬四千毛孔并祖翁一片田地四至分明總書一契自己復簽花押賣與諸人惜乎不遇受主若不得首座為伊作個中正管取至今日炙風吹頌家門清吉無妖怪何用高懸白澤圖捏個拳頭作枕臥諸人切莫妄分疏殃崛摩羅出家為沙門因持缽入城至一長者家值其婦產難子母未分長者云瞿曇弟子汝為至聖有何法能免產難殃崛曰我乍入道未知此法當去問佛卻來相報遽返白佛具陳上事佛告曰汝速去說我自從賢聖法來未曾殺生殃崛往告其婦人聞之當時分娩母子平安拈瞿曇因風吹火用力不多尊者走得腳酸只是傳言送語看這婦女大似客遇窮途正在苦惱之鄉忽得家信一到不覺腰包落地通身慶快呵呵且道這一笑落在那個分上若人道得分明方許救得產難頌嘮叨個瞿曇無生旨謾宣縱然能救得終是老婆禪昔有古德一日不赴堂侍者請赴堂德曰我今日在莊上喫油餈飽也者曰和尚不曾出入德曰汝去問莊主者方出門忽見莊主來謝和尚到莊拈融通定力出入由渠等閒一動一靜縱神物都不能測雖然如是檢點將來猶是鬼家活計當時若遇山僧正好驗過了打何故聻老老大大因甚出入不明頌古德家貧賊計生明修暗渡騙人精當時下得三椎鼓千載難逃背食名僧與疏山造壽塔畢白師師曰將多少錢與匠人僧曰一切在和尚師曰為將三文錢與匠人為將兩文錢與匠人為將一文錢與匠人若道得與吾親造壽塔來僧無語後僧舉似大嶺菴閑和尚即羅山也嶺曰還有人道得麼僧曰未有人道得嶺曰汝歸與疏山道若將三文錢與匠人和尚此生決定不得塔若將兩文錢與匠人和尚與匠人共出一隻手若將一文錢與匠人累他匠人鬚眉墮落僧回如教而說師具威儀望大嶺作禮歎曰將謂無人大嶺有古佛放光射到此間雖然如是也是臘月蓮花大嶺後聞此語曰我恁麼道早是龜毛長三尺拈疏山壽塔雖奇若不得這僧為伊開址羅山為伊合尖幾成虛設頌疏山老太奸頑塔告工完錢未完碎碎零零敲復打可憐主事被伊瞞休叵耐有傍觀千里同風徹夜寒三更二點多相似一盞清燈好自看百丈每上堂有一老人隨眾聽法一日眾退唯老人不去師問汝是何人老人曰某非人也於過去迦葉佛時曾住此山因學人問大修行人還落因果也無某對云不落因果遂五百生墮野狐身今請和尚代一轉語貴脫野狐身師曰汝問老人曰大修行人還落因果也無師曰不昧因果老人於言下大悟作禮曰某已脫野狐身住在山後敢乞依亡僧津送師令維那白椎告眾食後送亡僧大眾聚議一眾皆疑涅槃堂又無病人何故如此食後師領眾至山後巖下以杖挑出一死野狐乃依法火葬拈大凡修行人貴乎命根斷疑情破若命根不斷疑情不破未免打在八識區字頭出頭沒所以百丈老人特為後學初機作個樣子直教一言之下頓脫狐疑且不昧因果果脫得野狐身麼速道速道頌不落何深不昧幽兩重公案一機酬毫釐差處天懸隔說與禪流莫妄求昔有婆子供養一庵主經二十年常令一二八女子送飯給侍一日令女子抱定曰正恁麼時如何主曰枯木倚寒巖三冬無煖氣女子舉似婆婆曰我二十年秖供養得個俗漢遂遣出燒卻庵拈婆子探竿在手拋香餌以釣鯨鰲者僧以露網之魚見絲綸而疾迴避縱饒寒巖發燄猶不能使伊煖氣相接如此擔板怎得不受人之惑當時若見恁麼道便與攔胸托開云人來也他若回頭連棒打出管教者婆聞得立地放尿頌良夜星明直下垂細鱗巨口謾相疑清香豈是尋常餌好段因緣卻負伊雪峰搬柴次乃於洞山面前拋下一束山曰重多少峰曰盡大地人提不起山曰爭得到這裏峰無語拈雪峰逢人弄嘴伎死窮途洞山詰問來由言中有嚮若作雪峰待他問爭得到此便自指胸曰全承渠力管教洞山讚歎不及頌盡大地人提不起問伊爭得到者裡可憐雪老似癡呆有理難申骨都嘴僧問馬大師離四句絕百非請師指示某甲西來意師曰我今日勞倦不能為汝說問取智藏去僧問西堂堂云何不問和尚僧云和尚教來問堂云我今日頭痛不能為汝說問取海兄去僧又問百丈丈云我到這裏卻不會僧卻回舉似大師師曰藏頭白海頭黑頌馬師父子弄泥團丟去拋來總一般四句百非推卻了者僧當面受伊瞞趙州在東司見遠侍者過驀召文遠遠應諾州曰東司上不可與汝說佛法頌送屙放尿處佛法許誰知堪嗟趙州老齷齪滿肚皮燕山誥封夫人關門伊氏率男茂盛玻爾坤楚蠻子施貲在京師崇寧庵刻
